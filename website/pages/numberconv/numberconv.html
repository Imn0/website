<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Number Converter — imno</title>
        <link rel="stylesheet" href="numberconv.css" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    </head>

    <body>
        <div id="page">
            <div class="page-header">
                <h1>number converter</h1>
                <a class="back-link" href="../../index.html">back</a>
            </div>

            <div class="converter-grid">
                <div class="field">
                    <label for="decimal">Decimal</label>
                    <input type="text" id="decimal" class="number-box" />
                </div>
                <div class="field">
                    <label for="binary">Binary</label>
                    <input type="text" id="binary" class="number-box" />
                </div>
                <div class="field">
                    <label for="u2">
                        U2
                        <select id="u2-dropdown" class="bits-select">
                            <option value="4">4</option>
                            <option value="8">8</option>
                            <option value="16">16</option>
                            <option value="32">32</option>
                        </select>
                        bits
                    </label>
                    <input type="text" id="u2" class="number-box" />
                </div>
                <div class="field">
                    <label for="u1">
                        U1
                        <select id="u1-dropdown" class="bits-select">
                            <option value="4">4</option>
                            <option value="8">8</option>
                            <option value="16">16</option>
                            <option value="32">32</option>
                        </select>
                        bits
                    </label>
                    <input type="text" id="u1" class="number-box" />
                </div>
                <div class="field">
                    <label for="oct">Octal</label>
                    <input type="text" id="oct" class="number-box" />
                </div>
                <div class="field">
                    <label for="hex">Hexadecimal</label>
                    <input type="text" id="hex" class="number-box" />
                </div>
                <div class="field float32-field">
                    <label for="float32">float32</label>
                    <input type="text" id="float32" class="number-box" maxlength="32" spellcheck="false" autocomplete="off" />
                    <div class="f32-grid">
                        <div class="f32-group f32-sign">
                            <div class="f32-bits" id="f32-bits-sign"></div>
                            <div class="f32-label">sign</div>
                        </div>
                        <div class="f32-group f32-exp">
                            <div class="f32-bits" id="f32-bits-exp"></div>
                            <div class="f32-label" id="f32-label-exp">exponent</div>
                        </div>
                        <div class="f32-group f32-mantissa">
                            <div class="f32-bits" id="f32-bits-mantissa"></div>
                            <div class="f32-label" id="f32-label-mantissa">mantissa</div>
                        </div>
                    </div>
                </div>
                <div class="field">
                    <label for="custom" class="custom-base-label">
                        Base
                        <input maxlength="2" type="text" id="custom-size" class="custom-size-input" value="2" />
                    </label>
                    <input type="text" id="custom" class="number-box" />
                </div>
            </div>
        </div>

        <script src="numberconv.js"></script>
        <script>
        (function () {
            "use strict";

            function buildBits(containerId, count, startIndex) {
                var container = document.getElementById(containerId);
                for (var i = 0; i < count; i++) {
                    var btn = document.createElement("button");
                    btn.type = "button";
                    btn.className = "f32-bit";
                    btn.setAttribute("data-val", "0");
                    btn.setAttribute("data-index", String(startIndex + i));
                    btn.textContent = "0";
                    container.appendChild(btn);
                }
            }

            buildBits("f32-bits-sign",     1,  0);
            buildBits("f32-bits-exp",      8,  1);
            buildBits("f32-bits-mantissa", 23, 9);

            var floatInput = document.getElementById("float32");

            function allBitButtons() {
                return Array.from(document.querySelectorAll(".f32-bit"))
                    .sort(function (a, b) {
                        return Number(a.dataset.index) - Number(b.dataset.index);
                    });
            }

            function currentBitString() {
                return allBitButtons().map(function (b) { return b.dataset.val; }).join("");
            }

            function updateLabels(bits) {
                if (!bits || bits.length < 32) return;
                var expStored = parseInt(bits.slice(1, 9), 2);
                var expActual = expStored - 127;
                var expLabel = document.getElementById("f32-label-exp");
                if (expLabel) {
                    expLabel.textContent = "exp  stored: " + expStored + "  actual: " + expActual;
                }
                var frac = bits.slice(9);
                var fracNum = parseInt(frac, 2) / Math.pow(2, 23);
                var fracStr = fracNum.toFixed(6).slice(1);
                var mantLabel = document.getElementById("f32-label-mantissa");
                if (mantLabel) {
                    mantLabel.textContent = "mantissa  1" + fracStr + "\u2026";
                }
            }

            function setBitsFromString(str) {
                var padded = str.padStart(32, "0").slice(0, 32);
                allBitButtons().forEach(function (btn, i) {
                    var v = padded[i] === "1" ? "1" : "0";
                    btn.dataset.val = v;
                    btn.textContent = v;
                });
                updateLabels(padded);
            }

            updateLabels("0".repeat(32));

            document.querySelector(".f32-grid").addEventListener("click", function (e) {
                var btn = e.target.closest(".f32-bit");
                if (!btn) return;
                var newVal = btn.dataset.val === "1" ? "0" : "1";
                btn.dataset.val = newVal;
                btn.textContent = newVal;
                var bitStr = currentBitString();
                updateLabels(bitStr);
                floatInput.value = bitStr;
                floatInput.dispatchEvent(new Event("input", { bubbles: true }));
            });

            floatInput.addEventListener("input", function () {
                var val = floatInput.value;
                if (/^[01]{1,32}$/.test(val)) {
                    setBitsFromString(val);
                }
            });

            var nativeDescriptor = Object.getOwnPropertyDescriptor(HTMLInputElement.prototype, "value");

            Object.defineProperty(floatInput, "value", {
                get: function () {
                    return nativeDescriptor.get.call(this);
                },
                set: function (newValue) {
                    nativeDescriptor.set.call(this, newValue);
                    if (typeof newValue === "string" && /^[01]{1,32}$/.test(newValue)) {
                        setBitsFromString(newValue);
                    } else {
                        setBitsFromString("0".repeat(32));
                        updateLabels("0".repeat(32));
                    }
                },
                configurable: true
            });
        })();
        </script>
    </body>
</html>
